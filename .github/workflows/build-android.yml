name: Build Android APK

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install dependencies
      run: |
        npm ci || npm install

    - name: Install Capacitor CLI
      run: |
        npm install -g @capacitor/cli

    - name: Initialize Capacitor
      run: |
        if [ ! -d "android" ]; then
          npx cap init "System Monitor" "com.deck.systemmonitor" --web-dir=public
          npx cap add android
        fi

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew

    - name: Build Android APK (Debug)
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon

    - name: Build Android APK (Release unsigned)
      run: |
        cd android
        ./gradlew assembleRelease --no-daemon
      continue-on-error: true

    - name: Find APK files
      run: |
        echo "=== Debug APK ==="
        find android -name "*.apk" -type f
        echo ""
        echo "=== APK Details ==="
        find android -name "*.apk" -type f -exec ls -lh {} \;

    - name: Rename APK files
      run: |
        mkdir -p apk-output
        # Debug APK
        if [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
          cp android/app/build/outputs/apk/debug/app-debug.apk apk-output/system-monitor-debug.apk
        fi
        # Release APK (unsigned)
        if [ -f android/app/build/outputs/apk/release/app-release-unsigned.apk ]; then
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk apk-output/system-monitor-release-unsigned.apk
        fi
        # Release APK (signed, if exists)
        if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
          cp android/app/build/outputs/apk/release/app-release.apk apk-output/system-monitor-release.apk
        fi
        ls -lh apk-output/

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: system-monitor-debug-apk
        path: apk-output/system-monitor-debug.apk
        if-no-files-found: error

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: system-monitor-release-apk
        path: apk-output/system-monitor-release-*.apk
        if-no-files-found: warn

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          apk-output/*.apk
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Comment PR with APK download link
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const runId = context.runId;
          const repo = context.repo;

          const comment = `## 📦 Android APK Build Complete

          ### Download APK:
          - [Debug APK](https://github.com/${repo.owner}/${repo.repo}/actions/runs/${runId})

          ### Installation:
          1. Download the APK from the artifacts section above
          2. Enable "Install from Unknown Sources" on your Android device
          3. Install the APK
          4. Configure the server URL in the app settings

          ### Server Configuration:
          - Default port: 18489
          - You need to set your server IP address in the app
          `;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: repo.owner,
            repo: repo.repo,
            body: comment
          });
